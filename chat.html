<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Messages</title>
  <style>
    html,body{margin:0!important;padding:0!important;width:100%;height:100%;background:#075e54;overflow:hidden;-webkit-text-size-adjust:100%}body{font-family:sans-serif}.app{display:flex;flex-direction:column;height:100vh;background:var(--chat-bg,#e5ddd5)}.header{background-color:var(--chat-header,#075e54);color:white;padding:18px 12px 15px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}.back-button,.call-button{width:34px;height:34px;border:none;background:transparent;color:white;flex-shrink:0}.back-button{font-size:34px;line-height:28px;padding:0;font-weight:600}.call-button{font-size:21px;line-height:1;color:white;filter:brightness(0) invert(1);opacity:.95}.header-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px}.profile-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d9d9d9,#8fb7a7);background-size:cover;background-position:center;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);flex-shrink:0}.header-name{font-size:20px;font-weight:600;white-space:nowrap}.chat-container{flex:1;overflow-y:auto;padding:10px;background-color:var(--chat-bg,#e5ddd5);-webkit-overflow-scrolling:touch}.message{margin:10px 0;padding:10px;border-radius:10px;max-width:70%;clear:both;font-size:16px;line-height:1.35;word-wrap:break-word;box-shadow:0 1px 1px rgba(0,0,0,.08)}.from-them{background:var(--received-bubble,#fff);color:#111;float:left}.from-you{background:var(--sent-bubble,#dcf8c6);color:#111;float:right;margin-left:auto}.target-highlight{outline:3px solid rgba(18,140,126,.55);transition:outline .4s ease}.image-message{padding:4px;background:transparent;box-shadow:none}.image-message img{display:block;width:120px;max-width:100%;border-radius:10px}.timestamp-divider{clear:both;text-align:center;margin:14px 0 10px}.timestamp-divider span{display:inline-block;background:var(--timestamp-bubble,rgba(255,255,255,.75));color:#666;font-size:12px;padding:4px 9px;border-radius:10px}.footer{background-color:var(--chat-footer,#f0f0f0);display:flex;padding:10px 12px 24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));align-items:center;flex-shrink:0;border-top:1px solid #d0d0d0;gap:8px}.footer input{flex:1;padding:10px 14px;border-radius:20px;border:none;font-size:16px;min-width:0;outline:none}.camera-button,.send-button{width:38px;height:38px;border:none;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}.camera-button{background:#fff}.camera-icon{width:18px;height:14px;border:2px solid #666;border-radius:4px;position:relative;display:block}.camera-icon:before{content:"";position:absolute;top:-5px;left:3px;width:8px;height:4px;background:#666;border-radius:2px 2px 0 0}.camera-icon:after{content:"";position:absolute;top:3px;left:5px;width:4px;height:4px;border:2px solid #666;border-radius:50%}.send-button{background:var(--send-button,#128c7e)}.send-arrow{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid white;margin-left:2px}
  </style>
</head>
<body>
  <div class="app"><div class="header"><button class="back-button" type="button">‹</button><div class="header-center"><div class="profile-circle" id="profileCircle"></div><div class="header-name" id="chatHeader"></div></div><button class="call-button" type="button">📞</button></div><div class="chat-container" id="chatContainer"></div><div class="footer"><button class="camera-button" type="button"><span class="camera-icon"></span></button><input id="messageInput" type="text" placeholder="Message"><button class="send-button" onclick="sendText()" type="button"><span class="send-arrow"></span></button></div></div>
  <script src="config.js"></script><script src="shared.js"></script>
  <script>
    const ME=getQueryParam("me","Jess"),THEM=getQueryParam("them","Leon"),TARGET_MESSAGE_ID=getQueryParam("messageId","");document.title=ME+" Messages";document.getElementById("chatHeader").textContent=THEM;let lastRendered="",didScrollToTarget=false;
    async function loadMessages(){try{renderMessages(await apiGet("getMessages"))}catch(e){console.log("Load messages error:",e)}}
    async function loadStyles(){try{applyChatStyles(await apiGet("getChatStyles",{me:ME,them:THEM}))}catch(e){console.log("Load styles error:",e)}}
    function applyChatStyles(s){if(!s)return;setCssVar("--chat-header",s["Chat Header Colour"]);setCssVar("--chat-footer",s["Chat Footer Colour"]);setCssVar("--chat-bg",s["Chat Background Colour"]);setCssVar("--sent-bubble",s["Sent Bubble Colour"]);setCssVar("--received-bubble",s["Received Bubble Colour"]);setCssVar("--send-button",s["Send Button Colour"]);setCssVar("--timestamp-bubble",s["Timestamp Bubble Colour"]);if(s["Profile Image URL"])document.getElementById("profileCircle").style.backgroundImage=`url("${s["Profile Image URL"]}")`}
    function renderMessages(messages){const chat=document.getElementById("chatContainer");let previousTimeLabel="";const html=messages.map(msg=>{const side=msg.sender===ME?"from-you":"from-them",timeLabel=formatTimestampLabel(msg.timestamp),messageId=escapeHtml(msg.messageId||"");let timestampHtml="";if(timeLabel&&timeLabel!==previousTimeLabel){timestampHtml=`<div class="timestamp-divider"><span>${escapeHtml(timeLabel)}</span></div>`;previousTimeLabel=timeLabel}if(msg.type==="image")return`${timestampHtml}<div class="message ${side} image-message" data-message-id="${messageId}"><img src="${escapeHtml(msg.imageUrl)}"></div>`;return`${timestampHtml}<div class="message ${side}" data-message-id="${messageId}">${escapeHtml(msg.message)}</div>`}).join("");if(html!==lastRendered){chat.innerHTML=html;lastRendered=html;if(TARGET_MESSAGE_ID&&!didScrollToTarget)scrollToMessage(TARGET_MESSAGE_ID);else chat.scrollTop=chat.scrollHeight}}
    function scrollToMessage(messageId){const chat=document.getElementById("chatContainer"),target=chat.querySelector(`[data-message-id="${CSS.escape(messageId)}"]`);if(!target){chat.scrollTop=chat.scrollHeight;return}target.scrollIntoView({behavior:"smooth",block:"center"});target.classList.add("target-highlight");didScrollToTarget=true;setTimeout(()=>target.classList.remove("target-highlight"),1800)}
    async function sendText(){const input=document.getElementById("messageInput"),message=input.value.trim();if(!message)return;input.value="";try{await apiPost("sendMessage",{sender:ME,message});loadMessages()}catch(e){console.log("Send message error:",e)}}
    document.getElementById("messageInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendText()});loadStyles();loadMessages();setInterval(loadMessages,1500);
  </script>
</body>
</html>
